<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SecureNotes Pro</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        height: 100vh;
    }

    .sidebar {
        width: 280px;
        background: #111827;
        padding: 15px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #1f2937;
    }

    .title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    button {
        background: #2563eb;
        border: none;
        color: white;
        padding: 10px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #1d4ed8;
    }

    .note-list {
        margin-top: 10px;
        overflow-y: auto;
        flex: 1;
    }

    .note-item {
        padding: 10px;
        background: #1f2937;
        margin-bottom: 8px;
        border-radius: 8px;
        cursor: pointer;
    }

    .note-item:hover {
        background: #374151;
    }

    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    textarea {
        flex: 1;
        padding: 20px;
        font-size: 16px;
        border: none;
        outline: none;
        resize: none;
        background: #0b1220;
        color: #e5e7eb;
    }

    .topbar {
        padding: 10px;
        background: #111827;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1f2937;
    }

    input {
        padding: 8px;
        border-radius: 6px;
        border: none;
        width: 200px;
    }
</style>
</head>

<body>

<div class="sidebar">
    <div class="title">🔐 SecureNotes Pro</div>
    <button onclick="createNote()">+ New Note</button>
    <div class="note-list" id="noteList"></div>
</div>

<div class="main">
    <div class="topbar">
        <input type="password" id="password" placeholder="Enter password to unlock"/>
        <button onclick="lock()">Lock</button>
    </div>
    <textarea id="editor" placeholder="Unlock with password to start..." disabled></textarea>
</div>

<script>
let notes = [];
let currentIndex = null;
let key = null;

function encode(txt){
    return new TextEncoder().encode(txt);
}

function decode(buf){
    return new TextDecoder().decode(buf);
}

async function getKey(password){
    const enc = encode(password);
    const baseKey = await crypto.subtle.importKey(
        "raw",
        enc,
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: encode("secure-notes-salt"),
            iterations: 100000,
            hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt","decrypt"]
    );
}

async function encrypt(text){
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const data = encode(text);

    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        data
    );

    return {
        iv: Array.from(iv),
        data: Array.from(new Uint8Array(encrypted))
    };
}

async function decrypt(obj){
    const iv = new Uint8Array(obj.iv);
    const data = new Uint8Array(obj.data);

    const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        data
    );

    return decode(decrypted);
}

function saveLocal(){
    localStorage.setItem("secure_notes", JSON.stringify(notes));
}

function loadLocal(){
    const data = localStorage.getItem("secure_notes");
    if(data) notes = JSON.parse(data);
}

function render(){
    const list = document.getElementById("noteList");
    list.innerHTML = "";

    notes.forEach((n,i)=>{
        const div = document.createElement("div");
        div.className = "note-item";
        div.textContent = n.title || "Untitled Note";
        div.onclick = ()=>openNote(i);
        list.appendChild(div);
    });
}

function createNote(){
    notes.push({ title:"New Note", content:{iv:[],data:[]} });
    render();
    openNote(notes.length-1);
    saveLocal();
}

function openNote(i){
    currentIndex = i;
    document.getElementById("editor").value = "";
}

document.getElementById("editor").addEventListener("input", async (e)=>{
    if(currentIndex === null) return;
    const text = e.target.value;

    const enc = await encrypt(text);
    notes[currentIndex].content = enc;
    notes[currentIndex].title = text.split("\n")[0].slice(0,30);

    saveLocal();
    render();
});

async function unlock(){
    const pass = document.getElementById("password").value;
    key = await getKey(pass);

    loadLocal();

    // decrypt all notes
    for(let n of notes){
        if(n.content?.data?.length){
            try{
                n._decrypted = await decrypt(n.content);
            } catch(e){
                n._decrypted = "[Decryption failed - wrong password]";
            }
        }
    }

    render();
}

function lock(){
    location.reload();
}

document.getElementById("password").addEventListener("keydown", (e)=>{
    if(e.key === "Enter") unlock();
});
</script>

</body>
</html>
