<!DOCTYPE html>
<html>

<head>

<title>SubTrack</title>

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}


body{
margin:0;
background:#f8fafc;
color:#111827;
}


/* APP */

.app{
display:flex;
min-height:100vh;
}


/* SIDEBAR */

.sidebar{

width:260px;
background:#0b1220;
color:white;
padding:30px 20px;

}


.logo{

font-size:24px;
font-weight:800;
margin-bottom:40px;

}


.nav-title{

font-size:12px;
color:#64748b;
margin-bottom:10px;

}


.sidebar button{

width:100%;
padding:14px;
margin-bottom:8px;

background:none;
border:0;

color:#cbd5e1;

text-align:left;

cursor:pointer;

border-radius:8px;

font-size:15px;

}


.sidebar button:hover{

background:#1e293b;
color:white;

}





/* MAIN */

.main{

flex:1;
padding:35px;

}


.header{

display:flex;
justify-content:space-between;
align-items:center;

}


.header h1{

margin:0;

}




/* DASHBOARD */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin:30px 0;

}



.card{

background:white;

border:1px solid #e5e7eb;

padding:25px;

border-radius:14px;

}



.card-title{

color:#64748b;
font-size:13px;

}


.number{

font-size:36px;
font-weight:800;

margin-top:10px;

}





/* TABS */


.tab{

display:none;

}


.active{

display:block;

}





/* FORMS */


input,
textarea{

width:100%;

padding:14px;

border:1px solid #cbd5e1;

border-radius:8px;

margin:8px 0;

font-size:15px;

}


textarea{

height:260px;

}



button.primary{

background:#111827;

color:white;

border:0;

padding:13px 22px;

border-radius:8px;

cursor:pointer;

font-weight:600;

}


button.primary:hover{

background:#000;

}





/* TABLE */

.table{

background:white;

border:1px solid #e5e7eb;

border-radius:14px;

overflow:hidden;

}



.row{

display:grid;

grid-template-columns:2fr 1fr 1fr 100px;

padding:18px;

border-bottom:1px solid #e5e7eb;

align-items:center;

}



.row:hover{

background:#f8fafc;

}



.head{

font-size:12px;

color:#64748b;

text-transform:uppercase;

}



.delete{

background:white;

border:1px solid #ef4444;

color:#ef4444;

padding:8px;

border-radius:6px;

cursor:pointer;

}



.delete:hover{

background:#ef4444;

color:white;

}





.search{

margin-bottom:20px;

}





@media(max-width:800px){

.app{

display:block;

}


.sidebar{

width:100%;

}


.row{

grid-template-columns:1fr;

gap:10px;

}


}

</style>

</head>




<body>


<div class="app">



<div class="sidebar">


<div class="logo">
SubTrack
</div>


<div class="nav-title">
MANAGEMENT
</div>


<button onclick="tab('dashboard')">
Dashboard
</button>


<button onclick="tab('add')">
Add Subscription
</button>


<button onclick="tab('manage')">
Subscriptions
</button>


<button onclick="tab('notes')">
Notes
</button>



</div>







<div class="main">


<div class="header">

<h1>
Subscription Manager
</h1>


</div>





<div id="dashboard" class="tab active">


<div class="cards">


<div class="card">

<div class="card-title">
MONTHLY COST
</div>

<div class="number">
$<span id="total">0</span>
</div>

</div>



<div class="card">

<div class="card-title">
ACTIVE SUBSCRIPTIONS
</div>


<div class="number"
id="count">

0

</div>


</div>



</div>


</div>









<div id="add" class="tab">


<div class="card">


<h2>
Create Subscription
</h2>


<input id="name"
placeholder="Subscription name">


<input id="price"
type="number"
placeholder="Monthly price">


<input id="date"
type="date">


<button class="primary"
onclick="add()">

Create

</button>


</div>


</div>








<div id="manage" class="tab">


<div class="card">


<h2>
Subscription List
</h2>


<input class="search"
id="search"
placeholder="Search..."
onkeyup="display()">



<div class="table">


<div class="row head">

<div>Name</div>
<div>Price</div>
<div>Date</div>
<div></div>

</div>



<div id="list"></div>


</div>


</div>


</div>








<div id="notes" class="tab">


<div class="card">


<h2>
Notes
</h2>


<textarea id="notes"
placeholder="Internal notes..."></textarea>



<button class="primary"
onclick="saveNotes()">

Save

</button>



</div>


</div>







</div>

</div>








<script>


let subs =
JSON.parse(localStorage.getItem("subs"))
|| [];



document.getElementById("notes").value =
localStorage.getItem("notes")
|| "";






function tab(name){

document.querySelectorAll(".tab")
.forEach(x=>x.classList.remove("active"));


document.getElementById(name)
.classList.add("active");

}





function add(){


let name =
document.getElementById("name").value;


let price =
Number(document.getElementById("price").value);


let date =
document.getElementById("date").value;



if(!name || !price){

alert("Complete all fields");

return;

}



subs.push({

name,
price,
date

});


save();

display();


// CLEAR FORM

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("date").value="";


}







function display(){


let list =
document.getElementById("list");


list.innerHTML="";


let total=0;



let search =
document.getElementById("search").value
.toLowerCase();



subs
.filter(s=>s.name.toLowerCase().includes(search))
.forEach((s,i)=>{


total+=s.price;



list.innerHTML+=`

<div class="row">

<div>${s.name}</div>

<div>$${s.price}</div>

<div>${s.date}</div>

<div>

<button class="delete"
onclick="remove(${i})">

Delete

</button>


</div>


</div>


`;



});




document.getElementById("total")
.innerText=total.toFixed(2);


document.getElementById("count")
.innerText=subs.length;


}







function remove(i){

if(confirm("Delete subscription?")){


subs.splice(i,1);

save();

display();


}

}





function save(){

localStorage.setItem(
"subs",
JSON.stringify(subs)

);

}





function saveNotes(){

localStorage.setItem(
"notes",
document.getElementById("notes").value
);


alert("Saved");

}





display();


</script>


</body>

</html>
