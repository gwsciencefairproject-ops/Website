<!DOCTYPE html>
<html>

<head>

<title>SubTrack Pro</title>

<style>

*{
box-sizing:border-box;
font-family:Inter,Segoe UI,Arial,sans-serif;
}


body{

margin:0;
background:#f4f6f8;
color:#111827;

}



.app{

display:flex;
min-height:100vh;

}



/* SIDEBAR */

.sidebar{

width:260px;
background:#0b1220;
color:white;
padding:30px;

}


.logo{

font-size:24px;
font-weight:800;
margin-bottom:45px;

}


.sidebar button{

width:100%;
padding:14px;

background:none;

border:0;

color:#cbd5e1;

text-align:left;

border-radius:8px;

cursor:pointer;

margin-bottom:8px;

}


.sidebar button:hover{

background:#1e293b;
color:white;

}





/* MAIN */


.main{

flex:1;
padding:35px;

}


.title{

font-size:30px;
font-weight:800;

}





/* DASHBOARD */


.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin:30px 0;

}


.stat{

background:white;

padding:25px;

border:1px solid #e5e7eb;

border-radius:14px;

}


.label{

font-size:13px;

color:#64748b;

}


.value{

font-size:35px;

font-weight:800;

margin-top:10px;

}





.card{

background:white;

padding:25px;

border-radius:14px;

border:1px solid #e5e7eb;

margin-bottom:25px;

}




/* FORMS */


input,select,textarea{

width:100%;

padding:13px;

border:1px solid #cbd5e1;

border-radius:8px;

margin:8px 0;

}


textarea{

height:230px;

}



.primary{

background:#111827;

color:white;

border:0;

padding:13px 22px;

border-radius:8px;

cursor:pointer;

}





/* TABLE */


.table{

background:white;

border:1px solid #e5e7eb;

border-radius:14px;

overflow:hidden;

}


.row{

display:grid;

grid-template-columns:2fr 1fr 1fr 1fr 100px;

padding:18px;

border-bottom:1px solid #e5e7eb;

align-items:center;

}



.row:hover{

background:#f8fafc;

}



.header{

font-size:12px;

color:#64748b;

text-transform:uppercase;

}



.badge{

background:#dcfce7;

color:#166534;

padding:5px 10px;

border-radius:20px;

font-size:12px;

width:max-content;

}




.delete{

background:white;

border:1px solid #ef4444;

color:#ef4444;

padding:8px;

border-radius:6px;

cursor:pointer;

}





/* UPCOMING */


.upcoming{

display:flex;

justify-content:space-between;

padding:15px;

border-bottom:1px solid #eee;

}





.tab{

display:none;

}


.active{

display:block;

}





@media(max-width:800px){

.sidebar{

width:100%;

}


.app{

display:block;

}


.row{

grid-template-columns:1fr;

gap:10px;

}

}


</style>


</head>



<body>



<div class="app">



<div class="sidebar">


<div class="logo">
SubTrack Pro
</div>



<button onclick="openTab('dashboard')">
Dashboard
</button>


<button onclick="openTab('add')">
Add Subscription
</button>


<button onclick="openTab('manage')">
Manage
</button>


<button onclick="openTab('notes')">
Notes
</button>



</div>









<div class="main">


<h1 class="title">
Subscription Overview
</h1>






<div id="dashboard" class="tab active">


<div class="stats">


<div class="stat">

<div class="label">
MONTHLY COST
</div>

<div class="value">
$<span id="total">0</span>
</div>

</div>




<div class="stat">

<div class="label">
YEARLY COST
</div>

<div class="value">
$<span id="year">0</span>
</div>

</div>




<div class="stat">

<div class="label">
ACTIVE SERVICES
</div>

<div class="value"
id="count">

0

</div>


</div>



<div class="stat">

<div class="label">
AVERAGE COST
</div>


<div class="value">

$<span id="average">0</span>

</div>


</div>



</div>





<div class="card">


<h2>
Upcoming Renewals
</h2>


<div id="upcoming"></div>


</div>



</div>








<div id="add" class="tab">


<div class="card">


<h2>
Create Subscription
</h2>


<input id="name"
placeholder="Service name">


<input id="price"
type="number"
placeholder="Monthly cost">


<select id="category">


<option>
Streaming
</option>


<option>
Software
</option>


<option>
Fitness
</option>


<option>
Other
</option>


</select>



<input id="date"
type="date">


<button class="primary"
onclick="addSub()">

Add

</button>



</div>


</div>









<div id="manage" class="tab">


<div class="card">


<h2>
Subscription Database
</h2>



<input placeholder="Search..."
id="search"
onkeyup="display()">



<div class="table">


<div class="row header">

<div>Name</div>

<div>Category</div>

<div>Price</div>

<div>Status</div>

<div></div>

</div>


<div id="list"></div>


</div>



</div>


</div>









<div id="notes" class="tab">


<div class="card">


<h2>
Notes
</h2>


<textarea id="notesBox"></textarea>


<button class="primary"
onclick="saveNotes()">

Save Notes

</button>


</div>


</div>







</div>

</div>









<script>


let subs =
JSON.parse(localStorage.getItem("subs"))
|| [];



notesBox.value =
localStorage.getItem("notes")
|| "";





function openTab(x){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));


document.getElementById(x)
.classList.add("active");

}






function addSub(){


let name=document.getElementById("name").value;

let price=Number(document.getElementById("price").value);

let category=document.getElementById("category").value;

let date=document.getElementById("date").value;



if(!name||!price)return;



subs.push({

name,
price,
category,
date

});



save();

display();



// clear

name="";
price="";
category="";
date="";


document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("date").value="";


}







function display(){


let list=document.getElementById("list");

list.innerHTML="";


let total=0;


let search=
document.getElementById("search")?.value.toLowerCase()
||"";



subs.filter(s=>

s.name.toLowerCase().includes(search)

)
.forEach((s,i)=>{


total+=s.price;



list.innerHTML+=`

<div class="row">


<div>
${s.name}
</div>


<div>
${s.category}
</div>


<div>
$${s.price}
</div>


<div>

<span class="badge">
Active
</span>

</div>


<div>

<button class="delete"
onclick="remove(${i})">

Delete

</button>

</div>


</div>

`;



});




document.getElementById("total").innerText=
total.toFixed(2);


document.getElementById("year").innerText=
(total*12).toFixed(2);


document.getElementById("count").innerText=
subs.length;


document.getElementById("average").innerText=
subs.length?(total/subs.length).toFixed(2):"0";


showUpcoming();

}






function showUpcoming(){


let box=document.getElementById("upcoming");

box.innerHTML="";



subs.slice(0,5).forEach(s=>{


box.innerHTML+=`

<div class="upcoming">

<span>
${s.name}
</span>


<span>
${s.date}
</span>


</div>


`;


});


}






function remove(i){

subs.splice(i,1);

save();

display();

}





function save(){

localStorage.setItem(
"subs",
JSON.stringify(subs)
);

}




function saveNotes(){

localStorage.setItem(

"notes",

document.getElementById("notesBox").value

);


alert("Saved");

}




display();


</script>


</body>

</html>
