<!DOCTYPE html>
<html>

<head>

<title>SubTrack Pro</title>

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}


body{

margin:0;
background:#f1f3f6;
color:#111827;

}


/* LAYOUT */

.app{

display:flex;
height:100vh;

}



/* SIDEBAR */

.sidebar{

width:260px;
background:#0f172a;
color:white;
padding:35px 25px;

}


.brand{

font-size:22px;
font-weight:700;
letter-spacing:-.5px;
margin-bottom:45px;

}


.menu{

color:#94a3b8;
font-size:13px;
margin-bottom:12px;

}



.sidebar button{

width:100%;
background:transparent;
border:0;
color:#cbd5e1;
padding:14px;
text-align:left;
cursor:pointer;
font-size:15px;

}


.sidebar button:hover{

background:#1e293b;
color:white;

}





/* MAIN */


.main{

flex:1;
padding:35px;
overflow:auto;

}



.title{

font-size:30px;
font-weight:700;
margin-bottom:30px;

}




/* CONTENT */


.card{

background:white;
border:1px solid #e5e7eb;
padding:28px;
margin-bottom:25px;

}



.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;

}



.metric{

background:white;
border:1px solid #e5e7eb;
padding:25px;

}


.metric h4{

margin:0;
color:#64748b;
font-weight:500;

}


.metric span{

font-size:38px;
font-weight:700;

}





/* INPUTS */


input,
textarea{

width:100%;
padding:13px;
margin:8px 0;
border:1px solid #cbd5e1;
font-size:15px;

}


textarea{

height:250px;

}



input:focus,
textarea:focus{

outline:2px solid #2563eb;

}




/* BUTTON */

.primary{

background:#111827;
color:white;
border:none;
padding:13px 22px;
cursor:pointer;
font-weight:600;

}


.primary:hover{

background:#000;

}






/* TABLE STYLE */


.subscription{

display:grid;
grid-template-columns:2fr 1fr 1fr 100px;
align-items:center;

border-top:1px solid #e5e7eb;

padding:18px 10px;

}



.subscription:hover{

background:#f8fafc;

}



.header{

font-size:12px;
color:#64748b;
text-transform:uppercase;

}



.delete{

background:none;
border:1px solid #dc2626;
color:#dc2626;
padding:8px 12px;
cursor:pointer;

}


.delete:hover{

background:#dc2626;
color:white;

}





.tab{

display:none;

}


.active{

display:block;

}




.empty{

padding:40px;
text-align:center;
color:#64748b;

}






@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}


.sidebar{

width:80px;

}


.brand{

display:none;

}

}

</style>

</head>




<body>


<div class="app">


<div class="sidebar">


<div class="brand">

SUBTRACK PRO

</div>


<div class="menu">
MENU
</div>


<button onclick="openTab('dashboard')">
Dashboard
</button>


<button onclick="openTab('add')">
Add Subscription
</button>


<button onclick="openTab('manage')">
Subscriptions
</button>


<button onclick="openTab('notes')">
Notes
</button>


</div>







<div class="main">


<div class="title">

Subscription Management

</div>







<div id="dashboard" class="tab active">


<div class="grid">


<div class="metric">

<h4>
MONTHLY EXPENSE
</h4>

<span>
$<label id="total">0</label>
</span>


</div>



<div class="metric">

<h4>
ACTIVE SUBSCRIPTIONS
</h4>

<span id="count">
0
</span>


</div>



<div class="metric">

<h4>
STATUS
</h4>

<span>
Active
</span>


</div>



</div>


</div>








<div id="add" class="tab">


<div class="card">


<h2>Add Subscription</h2>


<input id="name"
placeholder="Name">


<input id="price"
type="number"
placeholder="Monthly Cost">


<input id="date"
type="date">


<button class="primary"
onclick="addSubscription()">

Create Subscription

</button>


</div>


</div>







<div id="manage" class="tab">


<div class="card">


<h2>Subscription Database</h2>


<div class="subscription header">

<div>Name</div>
<div>Cost</div>
<div>Renewal</div>
<div></div>

</div>


<div id="list"></div>


</div>


</div>








<div id="notes" class="tab">


<div class="card">


<h2>Internal Notes</h2>


<textarea id="notesBox"
placeholder="Enter notes..."></textarea>


<button class="primary"
onclick="saveNotes()">

Save Notes

</button>


</div>


</div>







</div>

</div>







<script>


let subscriptions =
JSON.parse(localStorage.getItem("subscriptions"))||[];


notesBox.value =
localStorage.getItem("notes")||";





function openTab(tab){

document.querySelectorAll(".tab")
.forEach(x=>x.classList.remove("active"));


document.getElementById(tab)
.classList.add("active");

}







function addSubscription(){


let name=document.getElementById("name").value;

let price=Number(document.getElementById("price").value);

let date=document.getElementById("date").value;



if(!name||!price)return;



subscriptions.push({
name,
price,
date
});


save();

display();


// CLEAR FORM

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("date").value="";


}







function display(){


let list=document.getElementById("list");

list.innerHTML="";


let total=0;



subscriptions.forEach((s,i)=>{


total+=s.price;



list.innerHTML+=`

<div class="subscription">

<div>
${s.name}
</div>

<div>
$${s.price}
</div>


<div>
${s.date}
</div>


<div>

<button class="delete"
onclick="removeSub(${i})">

Remove

</button>


</div>


</div>


`;



});



if(subscriptions.length==0)

list.innerHTML=
"<div class='empty'>No subscriptions found</div>";




document.getElementById("total").innerText=
total.toFixed(2);


document.getElementById("count").innerText=
subscriptions.length;


}






function removeSub(i){

subscriptions.splice(i,1);

save();

display();

}





function save(){

localStorage.setItem(
"subscriptions",
JSON.stringify(subscriptions)
);

}



function saveNotes(){

localStorage.setItem(
"notes",
document.getElementById("notesBox").value
);

}




display();


</script>


</body>

</html>
