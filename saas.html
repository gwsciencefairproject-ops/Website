<!DOCTYPE html>
<html>
<head>

<title>Subscription Tracker</title>

<style>

*{
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}


body{

    margin:0;
    background:#f5f7fb;
    color:#111827;

}


/* HEADER */

header{

    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    padding:35px;
    text-align:center;

}


header h1{

    margin:0;
    font-size:35px;

}



/* NAV */

nav{

    display:flex;
    justify-content:center;
    gap:12px;
    padding:15px;
    background:white;
    box-shadow:0 3px 10px #ddd;

}


nav button{

    border:none;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    background:#eef2ff;
    font-weight:bold;

}


nav button:hover{

    background:#2563eb;
    color:white;

}





/* TABS */


.tab{

    display:none;
    max-width:900px;
    margin:auto;
    padding:30px;

}


.active{

    display:block;

}



/* CARDS */


.card{

    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    margin-bottom:25px;

}


.card h2{

    margin-top:0;

}




/* INPUTS */


input,textarea{

    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:16px;

}


input:focus,
textarea:focus{

    outline:none;
    border-color:#2563eb;

}


textarea{

    height:220px;
    resize:none;

}



/* BUTTONS */


.primary{

    background:#2563eb;
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;

}


.primary:hover{

    background:#1d4ed8;

}



/* SUBSCRIPTIONS */


.subscription{

    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f8fafc;
    padding:18px;
    margin:12px 0;
    border-radius:14px;
    border:1px solid #e5e7eb;

}



.delete{

    background:#ef4444;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;

}


.delete:hover{

    background:#dc2626;

}



/* DASHBOARD */

.price{

    font-size:40px;
    font-weight:bold;
    color:#2563eb;

}




.empty{

    color:#6b7280;
    text-align:center;
    padding:20px;

}



/* MOBILE */


@media(max-width:600px){

nav{

    flex-wrap:wrap;

}


.subscription{

    flex-direction:column;
    gap:15px;

}

}


</style>


</head>


<body>



<header>

<h1>Subscription Tracker</h1>

<p>Manage all your subscriptions in one place</p>

</header>




<nav>

<button onclick="openTab('dashboard')">
Dashboard
</button>


<button onclick="openTab('add')">
Add Subscription
</button>


<button onclick="openTab('manage')">
Manage
</button>


<button onclick="openTab('notes')">
Notes
</button>


</nav>






<!-- DASHBOARD -->

<div id="dashboard" class="tab active">


<div class="card">

<h2>Total Monthly Spending</h2>

<div class="price">
$<span id="total">0</span>
</div>


</div>


</div>








<!-- ADD -->

<div id="add" class="tab">


<div class="card">


<h2>Add Subscription</h2>


<input id="name"
placeholder="Subscription name">


<input id="price"
type="number"
placeholder="Monthly price">


<input id="date"
type="date">



<button class="primary"
onclick="addSubscription()">

Add Subscription

</button>


</div>


</div>








<!-- MANAGE -->


<div id="manage" class="tab">


<div class="card">


<h2>Your Subscriptions</h2>


<div id="list"></div>


</div>


</div>








<!-- NOTES -->


<div id="notes" class="tab">


<div class="card">


<h2>Notes</h2>


<textarea id="notesBox"
placeholder="Write notes here..."></textarea>


<button class="primary"
onclick="saveNotes()">

Save Notes

</button>


</div>


</div>







<script>



let subscriptions =
JSON.parse(localStorage.getItem("subscriptions"))
|| [];




document.getElementById("notesBox").value =
localStorage.getItem("notes") || "";





function openTab(tab){


document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));


document.getElementById(tab)
.classList.add("active");


}







function addSubscription(){


let name =
document.getElementById("name").value;


let price =
Number(document.getElementById("price").value);


let date =
document.getElementById("date").value;



if(!name || !price){

alert("Fill in all fields");

return;

}



subscriptions.push({

name,
price,
date

});



save();

display();



// CLEAR BOXES AFTER ADDING

document.getElementById("name").value="";

document.getElementById("price").value="";

document.getElementById("date").value="";



}







function display(){


let list =
document.getElementById("list");


list.innerHTML="";


let total=0;



if(subscriptions.length===0){

list.innerHTML =
'<div class="empty">No subscriptions added yet</div>';

}




subscriptions.forEach((s,i)=>{


total += s.price;



list.innerHTML += `


<div class="subscription">


<div>

<b>${s.name}</b>

<br>

$${s.price}/month

<br>

Renewal: ${s.date}

</div>


<button class="delete"
onclick="removeSub(${i})">

Delete

</button>


</div>


`;



});



document.getElementById("total")
.innerText =
total.toFixed(2);



}






function removeSub(i){


subscriptions.splice(i,1);

save();

display();


}







function save(){


localStorage.setItem(

"subscriptions",

JSON.stringify(subscriptions)

);


}







function saveNotes(){


localStorage.setItem(

"notes",

document.getElementById("notesBox").value

);


alert("Notes saved");


}





display();



</script>



</body>
</html>
